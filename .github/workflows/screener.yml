name: 新高値ブレイクアウト スクリーナー

on:
  schedule:
    - cron: "35 6 * * 1-5"
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: スクリーナーを実行
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python screener.py

      - name: CSVをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screening-results-${{ github.run_id }}
          path: results_*.csv
          retention-days: 30
